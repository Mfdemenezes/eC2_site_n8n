# ===============================================
# GitLab CI/CD Pipeline - Infraestrutura + Website
# ===============================================

stages:
  - validate
  - plan
  - deploy-infra
  - deploy-website
  - update-containers

variables:
  TF_ROOT: ${CI_PROJECT_DIR}
  TF_IN_AUTOMATION: "true"
  TF_CLI_ARGS: "-no-color"
  AWS_DEFAULT_REGION: "us-east-1"
  S3_BUCKET: "mfdemenezes-terraform-bucket"

# ===============================================
# TERRAFORM JOBS
# ===============================================

# Terraform image para infraestrutura
.terraform-job: &terraform-job
  image:
    name: hashicorp/terraform:1.8.5
    entrypoint:
      - '/usr/bin/env'
      - 'PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin'
  cache:
    key: terraform-cache-$CI_COMMIT_REF_SLUG
    paths:
      - .terraform
      - .terraform.lock.hcl
  before_script:
    - cd ${TF_ROOT}
    - terraform --version
    - apk add --no-cache aws-cli
    - aws sts get-caller-identity
    - terraform init -reconfigure

# AWS CLI image para deploys
.aws-job: &aws-job
  image: amazon/aws-cli:latest
  before_script:
    - yum install -y git
    - aws sts get-caller-identity

# ===============================================
# STAGE 1: VALIDATE
# ===============================================
terraform-validate:
  <<: *terraform-job
  stage: validate
  script:
    - terraform fmt -check -recursive
    - terraform validate
    - echo "✅ Validação concluída!"
  rules:
    - if: $CI_COMMIT_BRANCH

# ===============================================
# STAGE 2: PLAN
# ===============================================
terraform-plan:
  <<: *terraform-job
  stage: plan
  script:
    - terraform plan -out=tfplan
    - terraform show tfplan
  artifacts:
    paths:
      - tfplan
      - terraform.tfstate
      - terraform.tfstate.backup
    expire_in: 1 day
  rules:
    - if: $CI_COMMIT_BRANCH

# ===============================================
# STAGE 3: DEPLOY INFRAESTRUTURA
# ===============================================
deploy-infrastructure:
  <<: *terraform-job
  stage: deploy-infra
  script:
    - echo "🚀 Fazendo deploy da infraestrutura..."
    - terraform apply -auto-approve tfplan
    - terraform output -json > infrastructure-outputs.json
    - echo "✅ Infraestrutura criada!"
  artifacts:
    paths:
      - infrastructure-outputs.json
    expire_in: 30 days
  dependencies:
    - terraform-plan
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH != "main"
      when: manual
  environment:
    name: $CI_COMMIT_REF_SLUG
    url: https://console.aws.amazon.com/ec2/v2/home?region=us-east-1

# ===============================================
# STAGE 4: DEPLOY WEBSITE
# ===============================================
deploy-website:
  <<: *aws-job
  stage: deploy-website
  script:
    - echo "📁 Fazendo upload do website para S3..."
    
    # Upload website files
    - aws s3 sync website/ s3://${S3_BUCKET}/website/ --delete
    
    # Upload docker-compose.yml
    - aws s3 cp docker-compose.yml s3://${S3_BUCKET}/docker-compose.yml
    
    # Upload user_data.sh
    - aws s3 cp user_data.sh s3://${S3_BUCKET}/user_data.sh
    
    - echo "✅ Website atualizado no S3!"
  dependencies:
    - deploy-infrastructure
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH != "main"
      when: manual
  environment:
    name: website-$CI_COMMIT_REF_SLUG

# ===============================================
# STAGE 5: UPDATE CONTAINERS
# ===============================================
update-containers:
  <<: *aws-job
  stage: update-containers
  script:
    - echo "🔄 Atualizando containers na EC2..."
    
    # Get EC2 instance IP from terraform outputs
    - |
      if [ -f infrastructure-outputs.json ]; then
        INSTANCE_IP=$(cat infrastructure-outputs.json | grep -o '"[0-9]*\.[0-9]*\.[0-9]*\.[0-9]*"' | head -1 | tr -d '"')
        echo "Instance IP: $INSTANCE_IP"
        
        # Aqui você pode usar AWS Systems Manager ou SSH para atualizar
        # Por enquanto, vamos apenas mostrar o comando
        echo "Para conectar via SSM:"
        echo "aws ssm start-session --target i-INSTANCE-ID"
        echo "cd /home/ec2-user/app"
        echo "docker-compose down"
        echo "aws s3 sync s3://${S3_BUCKET}/website/ ./nginx/html/"
        echo "docker-compose up -d"
      fi
    
    - echo "✅ Instruções de atualização geradas!"
  dependencies:
    - deploy-website
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH != "main"
      when: manual
  environment:
    name: containers-$CI_COMMIT_REF_SLUG

# ===============================================
# DESTROY (Manual)
# ===============================================
destroy-infrastructure:
  <<: *terraform-job
  stage: deploy-infra
  script:
    - echo "🚨 DESTRUINDO INFRAESTRUTURA!"
    - echo "Esta ação é IRREVERSÍVEL!"
    - sleep 5
    - terraform destroy -auto-approve
    - echo "💥 Infraestrutura destruída!"
  rules:
    - if: $CI_COMMIT_BRANCH
      when: manual
      allow_failure: false
  environment:
    name: $CI_COMMIT_REF_SLUG
    action: stop
