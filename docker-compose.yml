version: '3.8'

services:
  # Nginx para servir a página bio com SSL integrado
  nginx:
    image: nginx:alpine
    container_name: bio-nginx
    ports:
      - "80:80"
      - "443:443"
      - "8080:80"
    volumes:
      - ./nginx/html:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx-ssl:/etc/ssl
    restart: unless-stopped
    command: >
      sh -c "
      apk add --no-cache openssl &&
      mkdir -p /etc/ssl/certs /etc/ssl/private &&
      openssl genrsa -out /etc/ssl/private/nginx-selfsigned.key 2048 &&
      openssl req -new -x509 -key /etc/ssl/private/nginx-selfsigned.key -out /etc/ssl/certs/nginx-selfsigned.crt -days 365 -subj '/C=BR/ST=SP/L=SaoPaulo/O=MeuSite/CN=98.87.200.120' &&
      openssl dhparam -out /etc/ssl/certs/dhparam.pem 2048 &&
      chmod 600 /etc/ssl/private/nginx-selfsigned.key &&
      chmod 644 /etc/ssl/certs/nginx-selfsigned.crt &&
      chmod 644 /etc/ssl/certs/dhparam.pem &&
      nginx -g 'daemon off;'
      "
    networks:
      - app-network

  # N8N para automações via HTTPS
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-automation
    ports:
      - "5678:5678"
    volumes:
      - ./n8n-data:/home/node/.n8n
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_SECURE_COOKIE=true
      - NODE_ENV=production
      - WEBHOOK_URL=https://98.87.200.120/n8n/
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - N8N_EDITOR_BASE_URL=https://98.87.200.120/n8n/
      - N8N_PATH=/n8n/
    restart: unless-stopped
    networks:
      - app-network

  # Watchtower para auto-updates dos containers
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=3600
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  n8n-data:
  nginx-html:
  nginx-ssl:
